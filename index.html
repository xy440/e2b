<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E2B: Advanced Bengali Editor</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; max-width: 800px; margin: 0 auto; }
        .container { position: relative; }
        .editor-box { width: 100%; height: 300px; font-size: 20px; padding: 15px; background: #fff; border: 2px solid #007BFF; border-radius: 8px; outline: none; margin-bottom: 10px; overflow-y: auto; line-height: 1.5; }
        .toolbar { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        button { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        
        #pasteBtn { background-color: #28a745; }
        #copyBtn { background-color: #007bff; }
        #convertBtn { background-color: #fd7e14; }
        #translateBtn { background-color: #6f42c1; } 
        #undoBtn { background-color: #17a2b8; } /* Undo বাটনের জন্য সুন্দর টিল (Teal) কালার */
        #clearBtn { background-color: #dc3545; }
        
        #toast { visibility: hidden; min-width: 200px; background-color: #333; color: #fff; text-align: center; border-radius: 5px; padding: 10px; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1001; }
        
        .b-word { cursor: pointer; transition: color 0.2s; }
        .b-word:hover { color: #007BFF; }
        
        .suggestion-box { position: absolute; background: #fff; border: 1px solid #ccc; box-shadow: 0 5px 15px rgba(0,0,0,0.2); border-radius: 5px; list-style: none; padding: 0; display: none; z-index: 1000; min-width: 150px;}
        .suggestion-box li { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #eee; }
        .suggestion-box li:hover { background: #f0f8ff; }
        .eng-opt { color: #d9534f; font-family: monospace; }
        .copy-opt { color: #28a745; font-weight: bold; background: #fdfdfd; }

        /* Custom Modal / Popup Styles */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(2px);
            display: none; align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-content {
            background: #fff; padding: 25px; border-radius: 10px; width: 320px; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); animation: popIn 0.3s ease-out;
        }
        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .modal-content h3 { margin-top: 0; color: #333; margin-bottom: 10px; font-size: 22px; }
        .modal-content p { color: #666; font-size: 16px; margin-bottom: 25px; line-height: 1.4; }
        .modal-buttons { display: flex; justify-content: center; gap: 15px; }
        .btn-confirm { background-color: #dc3545; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-cancel { background-color: #6c757d; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

    <h2>E2B: বাংলা টাইপিং এবং ট্রান্সলেটর</h2>
    <div class="container">
        <div class="toolbar">
            <button id="pasteBtn">Paste</button>
            <button id="copyBtn">Copy All</button>
            <button id="convertBtn">Convert Banglish</button>
            <button id="translateBtn">Translate English</button>
            <button id="undoBtn">Undo</button>
            <button id="clearBtn">Clear</button>
        </div>
        <div id="editor" class="editor-box" contenteditable="true" spellcheck="false"></div>
    </div>

    <!-- Footer -->
    <footer>
        &copy; <a href="https://theme-x.org" target="_blank">theme-x.org</a>. All rights reserved.
    </footer>

    <!-- Dropdown and Toast -->
    <ul id="dropdown" class="suggestion-box"></ul>
    <div id="toast"></div>

    <!-- Custom Clear Confirmation Modal -->
    <div id="clearModal" class="modal-overlay">
        <div class="modal-content">
            <h3>মুছে ফেলতে চান?</h3>
            <p>আপনি কি নিশ্চিত যে আপনি এডিটরের সব লেখা মুছে ফেলতে চান?</p>
            <div class="modal-buttons">
                <button id="cancelClear" class="btn-cancel">Cancel</button>
                <button id="confirmClear" class="btn-confirm">Yes, Clear</button>
            </div>
        </div>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const dropdown = document.getElementById('dropdown');
        const toast = document.getElementById('toast');
        const clearModal = document.getElementById('clearModal');

        // Undo History Setup
        let undoStack = [];
        let isUndoing = false;

        function saveUndoState() {
            if (isUndoing) return;
            const content = editor.innerHTML;
            if (undoStack.length === 0 || undoStack[undoStack.length - 1] !== content) {
                undoStack.push(content);
                if (undoStack.length > 50) undoStack.shift(); // সর্বোচ্চ ৫০টি কাজের রেকর্ড রাখবে
            }
        }

        function showToast(msg) {
            toast.textContent = msg;
            toast.style.visibility = 'visible';
            setTimeout(() => toast.style.visibility = 'hidden', 2000);
        }

        window.onload = () => {
            editor.innerHTML = localStorage.getItem('savedBengaliHtml') || '';
            saveUndoState(); // পেজ লোড হওয়ার সাথে সাথে প্রথম স্টেট সেভ করা
        };

        const save = () => localStorage.setItem('savedBengaliHtml', editor.innerHTML);

        // সাধারণ টাইপিং করার সময় স্টেট সেভ করা (Debounce System)
        let typingTimer;
        editor.addEventListener('input', () => {
            save();
            clearTimeout(typingTimer);
            typingTimer = setTimeout(saveUndoState, 500); // লেখা থামানোর আধা সেকেন্ড পর সেভ হবে
        });

        // Undo Button Action
        document.getElementById('undoBtn').onclick = () => {
            if (undoStack.length > 1) {
                isUndoing = true;
                undoStack.pop(); // বর্তমান স্টেট বাদ দেওয়া
                const previousContent = undoStack[undoStack.length - 1];
                editor.innerHTML = previousContent; // আগের স্টেটে ফিরে যাওয়া
                save();
                showToast("Undo Successful!");
                isUndoing = false;
            } else {
                showToast("Nothing to undo!");
            }
        };

        // Copy Entire Text
        document.getElementById('copyBtn').onclick = () => {
            navigator.clipboard.writeText(editor.innerText).then(() => showToast("Entire Text Copied!"));
        };

        // Paste
        document.getElementById('pasteBtn').onclick = async () => {
            try {
                const text = await navigator.clipboard.readText();
                document.execCommand('insertText', false, text);
                saveUndoState(); // পেস্ট করার পর স্টেট সেভ
            } catch (err) {
                showToast("Please allow clipboard access!");
            }
        };

        // Convert Banglish
        document.getElementById('convertBtn').onclick = async () => {
            let rawText = editor.innerText;
            const parts = rawText.split(/([a-zA-Z]+)/);
            let newHtml = "";

            for (let part of parts) {
                if (/^[a-zA-Z]+$/.test(part)) {
                    try {
                        const res = await fetch(`https://inputtools.google.com/request?text=${part}&itc=bn-t-i0-und&num=3&cp=0&cs=1&ie=utf-8&oe=utf-8&app=test`);
                        const data = await res.json();
                        if (data[0] === 'SUCCESS') {
                            newHtml += `<span class="b-word" data-eng="${part}" data-alts='${JSON.stringify(data[1][0][1])}'>${data[1][0][1][0]}</span>`;
                        } else { 
                            newHtml += part; 
                        }
                    } catch(e) {
                        newHtml += part;
                    }
                } else {
                    newHtml += part.replace(/\./g, '।').replace(/\n/g, '<br>');
                }
            }
            editor.innerHTML = newHtml;
            save();
            saveUndoState(); // কনভার্ট করার পর স্টেট সেভ
            showToast("Converted to Bangla!");
        };

        // Translate English
        document.getElementById('translateBtn').onclick = async () => {
            const rawText = editor.innerText.trim();
            if (!rawText) {
                showToast("Editor is empty!");
                return;
            }
            
            showToast("Translating... Please wait.");
            
            try {
                const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(rawText)}&langpair=en|bn`);
                const data = await res.json();
                
                if (data.responseData && data.responseData.translatedText) {
                    editor.innerHTML = data.responseData.translatedText;
                    save();
                    saveUndoState(); // ট্রান্সলেট করার পর স্টেট সেভ
                    showToast("Translated Successfully!");
                } else {
                    showToast("Error in translation.");
                }
            } catch(e) {
                showToast("Translation Failed!");
            }
        };

        // Typing Logic (Banglish to Bangla on space/punctuation)
        editor.addEventListener('keyup', async function(e) {
            const triggerKeys = [' ', 'Enter', '.', ',', '?', '!'];
            
            if (triggerKeys.includes(e.key)) {
                const selection = window.getSelection();
                if (!selection.rangeCount) return;
                
                const range = selection.getRangeAt(0);
                const currentNode = range.startContainer;
                
                if (currentNode.nodeType !== Node.TEXT_NODE) return;

                const textBeforeCursor = currentNode.textContent.slice(0, range.startOffset);
                const match = textBeforeCursor.match(/([a-zA-Z]+)([\s.,?!]*)$/);

                if (match) {
                    const engWord = match[1];
                    let trailingChars = match[2];
                    
                    try {
                        const res = await fetch(`https://inputtools.google.com/request?text=${engWord}&itc=bn-t-i0-und&num=3&cp=0&cs=1&ie=utf-8&oe=utf-8&app=test`);
                        const data = await res.json();
                        
                        if (data[0] === 'SUCCESS') {
                            const span = document.createElement('span');
                            span.className = 'b-word';
                            span.dataset.eng = engWord;
                            span.dataset.alts = JSON.stringify(data[1][0][1]);
                            span.textContent = data[1][0][1][0];
                            
                            const start = range.startOffset - match[0].length;
                            const textNodeAfter = currentNode.splitText(start);
                            const remainingTextNode = textNodeAfter.splitText(match[0].length);
                            
                            currentNode.parentNode.replaceChild(span, textNodeAfter);
                            
                            trailingChars = trailingChars.replace(/\./g, '।');
                            
                            const separatorNode = document.createTextNode(trailingChars);
                            span.parentNode.insertBefore(separatorNode, span.nextSibling);
                            
                            range.setStart(separatorNode, trailingChars.length);
                            range.collapse(true);
                            selection.removeAllRanges();
                            selection.addRange(range);
                            
                            save();
                            saveUndoState(); // অটো-কনভার্ট হওয়ার পর স্টেট সেভ
                        }
                    } catch(err) {
                        console.error(err);
                    }
                }
            }
        });

        // Dropdown Click
        editor.addEventListener('click', (e) => {
            if (e.target.classList.contains('b-word')) {
                const alts = JSON.parse(e.target.dataset.alts);
                const currentWord = e.target.textContent;
                
                let listHtml = alts.map(a => `<li onclick="replaceWord('${a}')">${a}</li>`).join('');
                listHtml += `<li class="eng-opt" onclick="replaceWord('${e.target.dataset.eng}')">${e.target.dataset.eng}</li>`;
                listHtml += `<li class="copy-opt" onclick="copySingleWord('${currentWord}')">📋 Copy</li>`;
                
                dropdown.innerHTML = listHtml;
                
                const rect = e.target.getBoundingClientRect();
                dropdown.style.left = `${rect.left + window.scrollX}px`;
                dropdown.style.top = `${rect.bottom + window.scrollY + 5}px`;
                dropdown.style.display = 'block';
                window.activeWord = e.target;
            }
        });

        window.replaceWord = function(text) {
            window.activeWord.textContent = text;
            dropdown.style.display = 'none';
            save();
            saveUndoState(); // শব্দ পরিবর্তন করার পর স্টেট সেভ
        };

        window.copySingleWord = function(wordToCopy) {
            navigator.clipboard.writeText(wordToCopy).then(() => {
                dropdown.style.display = 'none';
                showToast(`"${wordToCopy}" Copied!`);
            });
        };

        document.addEventListener('click', (e) => { 
            if (!e.target.classList.contains('b-word')) {
                dropdown.style.display = 'none'; 
            }
        });

        // Custom Clear Popup Logic
        document.getElementById('clearBtn').onclick = () => {
            clearModal.style.display = 'flex';
        };

        document.getElementById('cancelClear').onclick = () => {
            clearModal.style.display = 'none';
        };

        document.getElementById('confirmClear').onclick = () => {
            editor.innerHTML = ''; 
            localStorage.removeItem('savedBengaliHtml');
            saveUndoState(); // ক্লিয়ার করার পরেও স্টেট সেভ (যাতে ভুলে ক্লিয়ার হলে Undo করা যায়!)
            clearModal.style.display = 'none';
            showToast("Editor Cleared!");
        };
    </script>
</body>
</html>
